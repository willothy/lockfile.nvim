name: Changelog

# Keep the [Unreleased] section of CHANGELOG.md current as commits land on main.
# The commit-back uses [skip ci] so it does not retrigger this (or any) workflow.
on:
  push:
    branches: [main]

permissions:
  contents: write

# Only the latest push needs to regenerate; cancel superseded runs to avoid
# racing pushes to main.
concurrency:
  group: changelog
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for git-cliff
      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Update CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git-cliff --config cliff.toml --output CHANGELOG.md
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs: update changelog [skip ci]"
            git push origin HEAD:main
          fi
