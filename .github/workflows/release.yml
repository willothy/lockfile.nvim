name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # The Windows mlua module link is best-effort; a failure here must not block
    # publishing the other platforms' binaries (Windows users build from source).
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            builder: zigbuild
            ext: so
            built: liblockfile_native.so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            builder: zigbuild
            ext: so
            built: liblockfile_native.so
          - target: x86_64-apple-darwin
            os: macos-latest
            builder: cargo
            ext: so
            built: liblockfile_native.dylib
            codesign: true
          - target: aarch64-apple-darwin
            os: macos-latest
            builder: cargo
            ext: so
            built: liblockfile_native.dylib
            codesign: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            builder: cargo
            ext: dll
            built: lockfile_native.dll
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install zig
        if: matrix.builder == 'zigbuild'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install cargo-zigbuild
        if: matrix.builder == 'zigbuild'
        run: cargo install cargo-zigbuild

      - name: Build (zigbuild)
        if: matrix.builder == 'zigbuild'
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Build (cargo)
        if: matrix.builder == 'cargo'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "13"

      # Ad-hoc sign so macOS does not block the downloaded dylib.
      - name: Codesign (macOS)
        if: matrix.codesign
        run: codesign --force --sign - "target/${{ matrix.target }}/release/${{ matrix.built }}"

      - name: Package asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.built }}" \
             "dist/lockfile_native-${{ matrix.target }}.${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: lockfile_native-${{ matrix.target }}
          path: dist/*

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for git-cliff
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble dist
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f -name 'lockfile_native-*' -exec cp {} dist/ \;
          # For nightly builds, record the exact commit so the download step can
          # verify a prebuilt matches the user's checked-out source before using it.
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "${{ github.sha }}" > dist/commit
          fi
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist

      # ---------- tagged release (v*) ----------
      - name: Install git-cliff
        if: startsWith(github.ref, 'refs/tags/v')
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: git-cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
          body_path: RELEASE_NOTES.md
      # Regenerate the full CHANGELOG.md and commit it to main. [skip ci] keeps
      # this docs commit from retriggering the workflow. Non-fatal: a protected
      # main must not fail an already-published release.
      - name: Update CHANGELOG.md on main
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git-cliff --config cliff.toml --output CHANGELOG.md
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs: update changelog for ${GITHUB_REF_NAME} [skip ci]"
            git push origin main
          fi

      # ---------- nightly (main) ----------
      - name: Move nightly tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f nightly "${{ github.sha }}"
          git push -f origin "refs/tags/nightly"
      - name: Publish nightly
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          body: "Rolling nightly build from `${{ github.sha }}`."
          files: dist/*
          fail_on_unmatched_files: false
